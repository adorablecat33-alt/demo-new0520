<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRS — 風險警報監控</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap');

:root {
  --bg-primary:    #090c10;
  --bg-secondary:  #0e1117;
  --bg-tertiary:   #131820;
  --bg-panel:      #161c27;
  --bg-card:       #1b2235;
  --bg-hover:      #212840;
  --border:        #232b3e;
  --border-light:  #2e3a52;
  --text-primary:  #e6eaf4;
  --text-secondary:#8892aa;
  --text-muted:    #4d5a74;
  --accent:        #3d7eff;
  --accent-dim:    #1e4db7;
  --accent-glow:   rgba(61,126,255,0.18);
  --gold:          #f0b429;
  --gold-dim:      #b8880f;
  --up:            #ff4060;
  --up-bg:         rgba(255,64,96,0.10);
  --down:          #00d4a0;
  --down-bg:       rgba(0,212,160,0.10);
  --warn:          #ffaa00;
  --warn-bg:       rgba(255,170,0,0.10);
  --danger:        #ff3333;
  --danger-bg:     rgba(255,51,51,0.10);
  --success:       #00d4a0;
  --mono:          'JetBrains Mono', monospace;
  --sans:          'Noto Sans TC', sans-serif;
  --radius:        8px;
  --radius-lg:     12px;
  --shadow:        0 2px 16px rgba(0,0,0,0.4);
  --shadow-lg:     0 8px 40px rgba(0,0,0,0.6);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

/* ── NAV SIDEBAR ── */
.nav-sidebar {
  width: 56px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 4px;
  flex-shrink: 0;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 200;
}
.nav-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
  margin-bottom: 12px;
  box-shadow: 0 0 16px var(--accent-glow);
  text-decoration: none;
}
.nav-item {
  width: 40px; height: 40px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  border: none; background: none;
  font-size: 18px;
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent-glow); color: var(--accent); }
.nav-item .nav-tooltip {
  position: absolute;
  left: 48px;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 4px 10px;
  white-space: nowrap;
  font-size: 12px;
  color: var(--text-primary);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: var(--shadow);
}
.nav-item:hover .nav-tooltip { opacity: 1; }
.nav-divider {
  width: 32px; height: 1px;
  background: var(--border);
  margin: 6px 0;
}
.nav-bottom { margin-top: auto; }

/* ── TOPBAR ── */
.topbar {
  height: 44px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── INDEX BAR ── */
.index-bar {
  height: 32px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 24px;
  flex-shrink: 0;
  overflow: hidden;
}
.idx-item { display: flex; align-items: center; gap: 8px; }
.idx-name { font-size: 11px; color: var(--text-muted); }
.idx-val  { font-family: var(--mono); font-size: 12px; font-weight: 600; }
.idx-chg  { font-family: var(--mono); font-size: 11px; }

/* ── CARDS ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── BADGE / TAG ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.badge-up      { background: var(--up-bg);      color: var(--up); }
.badge-down    { background: var(--down-bg);     color: var(--down); }
.badge-warn    { background: var(--warn-bg);     color: var(--warn); }
.badge-danger  { background: var(--danger-bg);   color: var(--danger); }
.badge-accent  { background: var(--accent-glow); color: var(--accent); }
.badge-muted   { background: var(--bg-hover);    color: var(--text-muted); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #5a8fff; }
.btn-ghost {
  background: transparent;
  border-color: var(--border-light);
  color: var(--text-secondary);
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-danger {
  background: var(--danger-bg);
  border-color: rgba(255,51,51,0.3);
  color: var(--danger);
}
.btn-danger:hover { background: rgba(255,51,51,0.2); }
.btn-warn {
  background: var(--warn-bg);
  border-color: rgba(255,170,0,0.3);
  color: var(--warn);
}
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-xs { padding: 2px 8px; font-size: 11px; }

/* ── FORM INPUTS ── */
select, input[type=text], input[type=number] {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--sans);
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
  transition: border-color 0.15s;
}
select:focus, input[type=text]:focus, input[type=number]:focus {
  border-color: var(--accent);
}

/* ── TABLES ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.data-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg-hover); }
.data-table .mono { font-family: var(--mono); }
.data-table .up   { color: var(--up); }
.data-table .down { color: var(--down); }
.data-table .warn { color: var(--warn); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  display: none;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  width: 420px;
  max-width: 90vw;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.modal-header-title {
  font-size: 14px;
  font-weight: 600;
}
.modal-body { padding: 16px 20px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ── TOAST ── */
.toast-container {
  position: fixed;
  bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 2000;
}
.toast {
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 10px 14px;
  min-width: 260px;
  box-shadow: var(--shadow-lg);
  display: flex; gap: 10px; align-items: flex-start;
  animation: toast-in 0.2s ease;
}
@keyframes toast-in {
  from { transform: translateX(20px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
.toast-title { font-weight: 600; font-size: 13px; }
.toast-msg   { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.toast-close { color: var(--text-muted); cursor: pointer; flex-shrink: 0; }
.toast-close:hover { color: var(--text-primary); }

/* ── RISK BAR ── */
.risk-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
.risk-bar-row  { display: flex; align-items: center; gap: 8px; }
.risk-bar-label { font-size: 11px; color: var(--text-muted); width: 80px; flex-shrink: 0; }
.risk-bar-val   { font-family: var(--mono); font-size: 12px; width: 44px; text-align: right; flex-shrink: 0; }
.risk-bar-track {
  flex: 1; height: 6px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  overflow: hidden;
}
.risk-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* ── PULSE DOT ── */
.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--down);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* ── STAT GRID ── */
.stat-grid {
  display: grid;
  gap: 10px;
}
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 11px; color: var(--text-muted); }
.stat-val   { font-family: var(--mono); font-size: 18px; font-weight: 700; }
.stat-sub   { font-size: 11px; color: var(--text-muted); }

/* ── COLORS ── */
.up      { color: var(--up); }
.down    { color: var(--down); }
.warn    { color: var(--warn); }
.danger  { color: var(--danger); }
.muted   { color: var(--text-muted); }
.mono    { font-family: var(--mono); }

</style>
<style>
body { display:flex; height:100vh; overflow:hidden; }
.page-body { margin-left:56px; flex:1; display:flex; flex-direction:column; overflow:hidden; }
.content { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }

/* ── ALERT LEVEL KPIS ── */
.alert-kpi { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.alert-kpi-card {
  border-radius:var(--radius-lg); padding:14px 16px;
  border:1px solid;
  display:flex; align-items:center; gap:14px;
}
.alert-kpi-card.danger { background:rgba(255,51,51,0.08);  border-color:rgba(255,51,51,0.3); }
.alert-kpi-card.warn   { background:rgba(255,170,0,0.08);  border-color:rgba(255,170,0,0.3); }
.alert-kpi-card.info   { background:rgba(61,126,255,0.08); border-color:rgba(61,126,255,0.3); }
.alert-kpi-card.ok     { background:rgba(0,212,160,0.08);  border-color:rgba(0,212,160,0.3); }
.alert-kpi-icon { font-size:28px; }
.alert-kpi-count { font-family:var(--mono); font-size:28px; font-weight:700; }
.alert-kpi-label { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* ── LIVE ALERT FEED ── */
.feed-wrap {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
}
.feed-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px; border-bottom:1px solid var(--border);
  background:var(--bg-secondary);
}
.feed-title { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
.feed-live { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--down); }

.alert-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 14px; border-bottom:1px solid var(--border);
  animation:alert-slide 0.3s ease;
  cursor:pointer; transition:background 0.1s;
}
.alert-item:hover { background:var(--bg-hover); }
.alert-item:last-child { border-bottom:none; }
@keyframes alert-slide {
  from { opacity:0; transform:translateX(-8px); }
  to   { opacity:1; transform:translateX(0); }
}
.alert-level-bar {
  width:3px; align-self:stretch; border-radius:2px; flex-shrink:0;
}
.alert-level-bar.danger { background:var(--danger); }
.alert-level-bar.warn   { background:var(--warn); }
.alert-level-bar.info   { background:var(--accent); }
.alert-icon { font-size:20px; flex-shrink:0; }
.alert-body { flex:1; }
.alert-title-row { display:flex; align-items:center; gap:8px; margin-bottom:3px; }
.alert-title { font-size:13px; font-weight:600; }
.alert-ts { font-family:var(--mono); font-size:11px; color:var(--text-muted); margin-left:auto; }
.alert-meta { font-size:11px; color:var(--text-secondary); }
.alert-detail { font-size:11px; color:var(--text-muted); margin-top:4px; }
.alert-actions { display:flex; gap:6px; margin-top:8px; }

/* ── TWO-COL ── */
.two-col { display:grid; grid-template-columns:1fr 380px; gap:14px; }

/* ── HEATMAP ── */
.heatmap-wrap {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
}
.heatmap-header {
  padding:12px 14px; border-bottom:1px solid var(--border);
  background:var(--bg-secondary);
  font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;
}
.heatmap-body { padding:12px 14px; }
.hm-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.hm-name { font-size:12px; width:70px; flex-shrink:0; }
.hm-bar-wrap { flex:1; display:flex; gap:3px; }
.hm-segment {
  height:20px; border-radius:3px; flex:1;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:600; transition:opacity 0.2s;
}
.hm-segment:hover { opacity:0.8; }

/* ── QUICK ACTIONS ── */
.quick-actions {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
}
.qa-header {
  padding:12px 14px; border-bottom:1px solid var(--border);
  background:var(--bg-secondary);
  font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;
}
.qa-body { padding:12px; display:flex; flex-direction:column; gap:8px; }
.qa-btn {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  cursor:pointer; transition:all 0.15s;
  background:var(--bg-tertiary);
  text-align:left;
}
.qa-btn:hover { border-color:var(--border-light); background:var(--bg-hover); }
.qa-btn.danger-btn:hover { border-color:rgba(255,51,51,0.4); background:rgba(255,51,51,0.08); }
.qa-icon { font-size:18px; flex-shrink:0; }
.qa-label { font-size:12px; font-weight:500; color:var(--text-primary); }
.qa-desc  { font-size:10px; color:var(--text-muted); }

/* ── FREEZE BANNER ── */
.freeze-banner {
  background:rgba(255,51,51,0.12);
  border:1px solid rgba(255,51,51,0.4);
  border-radius:var(--radius-lg);
  padding:14px 18px;
  display:flex; align-items:center; gap:14px;
  display:none;
}
.freeze-banner.show { display:flex; }
</style>
</head>

<div class="toast-container" id="toastContainer"></div>
<script>
// ── SHARED STATE ──
const AppState = {
  currentTrader: 'wzy',
  currentAccount: 'sinopac_fut',
  marketOpen: true,
  systemTime: new Date(),

  traders: {
    wzy:  { name:'交易員A', type:'CAPITAL', todayPnl:-4450000, floatPnl:-3588220, avail:29873072, risk:225, lossRate:44.5, quotaRate:51.3, locked:false, active:true },
    czl:  { name:'交易員B', type:'CAPITAL', todayPnl:-132299,  floatPnl:-88000,   avail:8200000,  risk:121, lossRate:13.2, quotaRate:76.4, locked:false, active:true },
    chen: { name:'交易員C', type:'PROP',    todayPnl:85000,    floatPnl:12000,    avail:15000000, risk:340, lossRate:5.1,  quotaRate:32.0, locked:false, active:true },
  },

  accounts: {
    sinopac_fut: { label:'永豐 期-台北3240627', broker:'sinopac', type:'FUTURES', status:'ACTIVE', locked:false },
    sinopac_stk: { label:'永豐 證-敦南0388939', broker:'sinopac', type:'STOCK',   status:'ACTIVE', locked:false },
    fubon_fut:   { label:'富邦 期-0239847',     broker:'fubon',   type:'FUTURES', status:'ACTIVE', locked:false },
    kgi_stk:     { label:'凱基 證-7832910',     broker:'kgi',     type:'STOCK',   status:'ACTIVE', locked:false },
  },

  marketData: {
    taiex:  { val: 40175, chg: -716,  pct: -1.75 },
    txf:    { val: 40240, chg: -725,  pct: -1.77 },
    mtx:    { val: 40232, chg: -718,  pct: -1.75 },
    usd_twd:{ val: 31.82, chg: +0.12, pct: +0.38 },
  },

  riskAlerts: [
    { id:1, ts:'14:47:08', trader:'交易員A', account:'永豐期台北', level:'warn',   event:'日損警戒 44.5%',       handled:false },
    { id:2, ts:'14:22:15', trader:'交易員B', account:'富邦期',     level:'danger', event:'風險指標超標 121%',    handled:false },
    { id:3, ts:'13:58:40', trader:'交易員C', account:'凱基證',     level:'info',   event:'大額委託二次確認',     handled:true  },
    { id:4, ts:'13:10:00', trader:'系統',    account:'—',          level:'info',   event:'風控規則更新 (管理員)', handled:true  },
  ],
};

// ── TIME ──
function fmtTime(d = new Date()) {
  return d.toTimeString().slice(0,8);
}
function fmtDateTime(d = new Date()) {
  return d.toISOString().replace('T',' ').slice(0,19);
}
function startClock(el) {
  function tick() {
    AppState.systemTime = new Date();
    if (el) el.textContent = fmtTime(AppState.systemTime);
  }
  tick();
  return setInterval(tick, 1000);
}

// ── NUMBER FORMAT ──
function fmt(n, decimals = 0) {
  if (n == null) return '—';
  return Number(n).toLocaleString('zh-TW', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}
function fmtPnl(n) {
  if (n == null) return '—';
  const s = n >= 0 ? '+' : '';
  return s + fmt(n);
}
function colorPnl(n) {
  return n >= 0 ? 'down' : 'up'; // down=green up=red (台股慣例)
}

// ── TOAST ──
function showToast(title, msg = '', type = 'info', duration = 5000) {
  let container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const colorMap = { info:'var(--accent)', success:'var(--down)', warn:'var(--warn)', danger:'var(--danger)' };
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderLeftColor = colorMap[type] || 'var(--accent)';
  t.style.borderLeftWidth = '3px';
  t.innerHTML = `
    <div style="flex:1">
      <div class="toast-title" style="color:${colorMap[type]}">${title}</div>
      ${msg ? `<div class="toast-msg">${msg}</div>` : ''}
    </div>
    <div class="toast-close" onclick="this.parentElement.remove()">✕</div>
  `;
  container.appendChild(t);
  if (duration > 0) setTimeout(() => t.remove(), duration);
}

// ── MODAL ──
function openModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('open');
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('open');
}

// ── NAV ACTIVE ──
function setNavActive(page) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
}

// ── INDEX BAR TICK ──
function tickMarket() {
  Object.keys(AppState.marketData).forEach(k => {
    const d = AppState.marketData[k];
    d.val += (Math.random() - 0.5) * 8;
    d.chg += (Math.random() - 0.5) * 2;
    d.pct = d.chg / (d.val - d.chg) * 100;
  });
  renderIndexBar();
}
function renderIndexBar() {
  const bar = document.getElementById('indexBar');
  if (!bar) return;
  const d = AppState.marketData;
  bar.innerHTML = `
    <div class="idx-item">
      <span class="idx-name">加權指數</span>
      <span class="idx-val ${d.taiex.chg>=0?'down':'up'}">${fmt(d.taiex.val)}</span>
      <span class="idx-chg ${d.taiex.chg>=0?'down':'up'}">${d.taiex.chg>=0?'▲':'▼'} ${Math.abs(d.taiex.chg).toFixed(0)} (${d.taiex.pct.toFixed(2)}%)</span>
    </div>
    <div class="idx-item">
      <span class="idx-name">台指期</span>
      <span class="idx-val ${d.txf.chg>=0?'down':'up'}">${fmt(d.txf.val)}</span>
      <span class="idx-chg ${d.txf.chg>=0?'down':'up'}">${d.txf.chg>=0?'▲':'▼'} ${Math.abs(d.txf.chg).toFixed(0)}</span>
    </div>
    <div class="idx-item">
      <span class="idx-name">小台</span>
      <span class="idx-val ${d.mtx.chg>=0?'down':'up'}">${fmt(d.mtx.val)}</span>
      <span class="idx-chg ${d.mtx.chg>=0?'down':'up'}">${d.mtx.chg>=0?'▲':'▼'} ${Math.abs(d.mtx.chg).toFixed(0)}</span>
    </div>
    <div class="idx-item">
      <span class="idx-name">美元/台幣</span>
      <span class="idx-val">${d.usd_twd.val.toFixed(2)}</span>
      <span class="idx-chg ${d.usd_twd.chg>=0?'up':'down'}">${d.usd_twd.chg>=0?'+':''}${d.usd_twd.chg.toFixed(2)}</span>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
      <div class="pulse-dot"></div>
      <span style="font-size:10px;color:var(--text-muted);" id="clockDisplay">${fmtTime()}</span>
    </div>
  `;
}

// ── RISK BAR RENDER ──
function renderRiskBar(pct, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const color = pct >= 80 ? 'var(--danger)' : pct >= 60 ? 'var(--warn)' : 'var(--accent)';
  el.innerHTML = `
    <div class="risk-bar-track">
      <div class="risk-bar-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div>
    </div>
    <span style="font-family:var(--mono);font-size:11px;color:${color}">${pct.toFixed(1)}%</span>
  `;
}

</script>
<script>

let alerts = [
  { id:1, level:'danger', icon:'🚨', ts:'14:22:15', title:'風險指標超標', trader:'交易員B', account:'富邦期-0239847',
    meta:'風險指標 121% > 閾值 100%', detail:'交易員B 今日累積浮損 -88,000，保證金不足警戒。建議立即聯繫交易員確認部位。', handled:false },
  { id:2, level:'warn', icon:'⚠️', ts:'14:47:08', title:'日損警戒觸發', trader:'交易員A', account:'永豐期台北3240627',
    meta:'今日損益 -4,450,000 (44.5%)，警戒值 40%', detail:'交易員A 日損已達警戒值，後續委託需二次確認。請監控是否達熔斷閾值 80%。', handled:false },
  { id:3, level:'info', icon:'ℹ️', ts:'13:58:40', title:'大額委託二次確認', trader:'交易員C', account:'凱基證-7832910',
    meta:'2330台積電 買進 50張 @980，金額 49,000,000', detail:'交易員C 執行大額委託，已完成二次確認並通過風控審核。', handled:true },
  { id:4, level:'info', icon:'ℹ️', ts:'13:10:00', title:'風控規則更新', trader:'管理員', account:'—',
    meta:'調整交易員A日損限額至 10,000,000', detail:'超級管理員於 13:10 修改風控規則，已記錄稽核日誌。', handled:true },
];

window.onload = () => {
  renderIndexBar();
  startClock(document.getElementById('clockDisplay'));
  setInterval(tickMarket, 3000);
  renderAlertFeed();
  renderHeatmap();
  // simulate new alert
  setTimeout(() => addNewAlert(), 8000);
  setTimeout(() => addNewAlert2(), 15000);
};

function renderAlertFeed() {
  document.getElementById('alertFeed').innerHTML = alerts.map(a => `
    <div class="alert-item ${a.handled?'':''}">
      <div class="alert-level-bar ${a.level}"></div>
      <div class="alert-icon">${a.icon}</div>
      <div class="alert-body">
        <div class="alert-title-row">
          <span class="alert-title" style="color:${a.level==='danger'?'var(--danger)':a.level==='warn'?'var(--warn)':'var(--text-primary)'}">${a.title}</span>
          <span class="badge ${a.level==='danger'?'badge-danger':a.level==='warn'?'badge-warn':'badge-accent'}" style="font-size:10px">${a.level.toUpperCase()}</span>
          ${a.handled ? '<span class="badge badge-down" style="font-size:10px">已處理</span>' : '<span class="badge badge-muted" style="font-size:10px">未處理</span>'}
          <span class="alert-ts">${a.ts}</span>
        </div>
        <div class="alert-meta">
          <span style="color:var(--text-primary)">${a.trader}</span>
          <span style="margin:0 6px;color:var(--text-muted)">·</span>
          <span>${a.account}</span>
          <span style="margin:0 6px;color:var(--text-muted)">·</span>
          <span>${a.meta}</span>
        </div>
        <div class="alert-detail">${a.detail}</div>
        ${!a.handled ? `
        <div class="alert-actions">
          <button class="btn btn-primary btn-xs" onclick="handleAlert(${a.id})">✓ 標記已處理</button>
          ${a.level==='danger'||a.level==='warn' ? `<button class="btn btn-danger btn-xs" onclick="lockFromAlert('${a.trader}')">🔒 鎖定交易員</button>` : ''}
        </div>` : ''}
      </div>
    </div>
  `).join('');
  updateCounts();
}

function updateCounts() {
  const unhandled = alerts.filter(a=>!a.handled);
  document.getElementById('unhandledBadge').textContent = unhandled.length + ' 個未處理';
  document.getElementById('cnt-danger').textContent = alerts.filter(a=>a.level==='danger'&&!a.handled).length;
  document.getElementById('cnt-warn').textContent = alerts.filter(a=>a.level==='warn'&&!a.handled).length;
  document.getElementById('cnt-info').textContent = alerts.filter(a=>a.level==='info'&&!a.handled).length;
  document.getElementById('cnt-handled').textContent = alerts.filter(a=>a.handled).length;
}

function handleAlert(id) {
  const a = alerts.find(x=>x.id===id);
  if (a) { a.handled = true; renderAlertFeed(); showToast('✅ 已標記處理', a.title, 'success'); }
}
function lockFromAlert(trader) {
  showToast('🔒 交易員已鎖定', trader + ' 禁止下單', 'danger');
}
function handleAll() {
  alerts.forEach(a=>a.handled=true);
  renderAlertFeed();
  showToast('✅ 全部已處理', '所有警報已標記完成', 'success');
}
function lockTrader(id) { showToast('🔒 交易員A 已鎖定', '已記錄稽核日誌', 'warn'); }
function freezeAccount(b) { showToast('❄️ 帳號凍結', '富邦期帳號已凍結，禁止下單', 'danger'); }
function notifyTrader(id) { showToast('📣 通知已發送', '交易員B 已收到風控警示', 'info'); }
function exportLog() { showToast('📋 匯出中', '今日警報日誌 CSV 已準備', 'success'); }

function globalFreeze() {
  document.getElementById('freezeBanner').classList.add('show');
  showToast('🔴 全局熔斷啟動', '所有帳號已凍結', 'danger', 0);
}
function unfreeze() {
  document.getElementById('freezeBanner').classList.remove('show');
  showToast('✅ 熔斷已解除', '帳號恢復正常', 'success');
}

function addNewAlert() {
  const now = fmtTime();
  alerts.unshift({
    id: alerts.length+1, level:'warn', icon:'⚠️', ts:now,
    title:'帳號額度警戒', trader:'交易員A', account:'永豐期台北',
    meta:'額度使用率 81.3%，超過警戒閾值 80%',
    detail:'交易員A 額度使用率持續上升，請注意後續委託額度。', handled:false
  });
  renderAlertFeed();
  showToast('⚠️ 新警報', '交易員A 額度使用率 81.3%', 'warn');
}
function addNewAlert2() {
  const now = fmtTime();
  alerts.unshift({
    id: alerts.length+1, level:'danger', icon:'🚨', ts:now,
    title:'帳號日損接近熔斷', trader:'交易員A', account:'永豐期台北',
    meta:'今日損益 -7,800,000 (78%)，熔斷閾值 80%',
    detail:'警告：交易員A 日損率達 78%，即將觸發熔斷，請立即介入。', handled:false
  });
  renderAlertFeed();
  showToast('🚨 緊急警報', '交易員A 日損 78%，即將熔斷！', 'danger', 0);
}

function renderHeatmap() {
  const traders = [
    { name:'交易員A', metrics:[ {label:'日損', val:44.5, color:'var(--warn)'}, {label:'額度', val:51.3, color:'var(--accent)'}, {label:'浮損', val:35, color:'var(--up)'}, {label:'風控', val:55, color:'var(--warn)'} ] },
    { name:'交易員B', metrics:[ {label:'日損', val:13.2, color:'var(--down)'}, {label:'額度', val:76.4, color:'var(--warn)'}, {label:'浮損', val:10, color:'var(--down)'}, {label:'風控', val:82, color:'var(--danger)'} ] },
    { name:'交易員C', metrics:[ {label:'日損', val:5.1,  color:'var(--down)'}, {label:'額度', val:32.0, color:'var(--down)'}, {label:'浮損', val:2,  color:'var(--down)'}, {label:'風控', val:20, color:'var(--down)'} ] },
  ];
  const labels = ['日損率','額度使用','浮損率','風控評分'];
  document.getElementById('heatmap').innerHTML = `
    <div style="display:grid;grid-template-columns:70px 1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px;">
      <div></div>
      ${labels.map(l=>`<div style="font-size:10px;color:var(--text-muted);text-align:center">${l}</div>`).join('')}
    </div>
    ${traders.map(t => `
      <div style="display:grid;grid-template-columns:70px 1fr 1fr 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center;">
        <div style="font-size:12px;color:var(--text-primary)">${t.name}</div>
        ${t.metrics.map(m => {
          const alpha = Math.min(0.9, m.val/100*1.2);
          return `<div style="height:28px;border-radius:4px;background:${m.color};opacity:${alpha};display:flex;align-items:center;justify-content:center;">
            <span style="font-size:10px;font-family:var(--mono);font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5)">${m.val.toFixed(1)}%</span>
          </div>`;
        }).join('')}
      </div>
    `).join('')}
    <div style="margin-top:12px;display:flex;gap:12px;">
      <div style="font-size:10px;color:var(--text-muted);">顏色深度對應風險程度 — 顏色越深越需關注</div>
    </div>
  `;
}
</script>
